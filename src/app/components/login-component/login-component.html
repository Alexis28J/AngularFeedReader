<!-- per fare la form di login, abbiamo usato la ngForm -->

<div>
    <form (ngSubmit)="doLogin()">
    <input type="text" [(ngModel)]="email" name="email">
    <input type="password" [(ngModel)]="password" name="password">
    <button type="submit">login</button>
</form>
<p>{{errorMessage()}}</p>
<p>Non sei ancora registrato??? <a routerLink="/register">Registrati!</a></p>
</div>
